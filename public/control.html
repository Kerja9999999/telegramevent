
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ALB CarWash Control</title>

<style>

body{
    background:#101820;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:40px;
}

button{
    width:220px;
    height:60px;
    font-size:22px;
    border:none;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
}

.blue{
    background:#2196F3;
    color:white;
}

.green{
    background:#4CAF50;
    color:white;
}

.red{
    background:#F44336;
    color:white;
}

</style>

</head>

<body>

<h1>🚿 ALB CARWASH CONTROL</h1>

<button class="blue">🔵 BLUE</button>

<br>

<button class="green">🎵 MUSIC</button>

<br>

<button class="red">⛔ STOP</button>
<script>

async function setColor(color){

    const r = await fetch("/api/color/" + color,{
        method:"POST"
    });

    const j = await r.json();

    console.log(j);

}

document.querySelector(".blue").onclick = () => setColor("blue");

</script>
</body>
</html>
